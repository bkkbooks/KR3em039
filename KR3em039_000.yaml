body:
  text: 繭唇一內經云脾氣開於口又云脾之榮在唇蓋燥則干熱則裂風則瞤寒則揭若唇腫起白皮皺裂如蠶繭名曰繭唇有唇腫重出如繭者有本細末大如繭如瘤者或因七情動火傷血或因心火傳授脾經或因厚味積熱傷脾大要審本症察兼症補脾氣生脾血則燥自潤火自除風自息腫自消若患者忽略治者不察妄用清熱消毒之藥或用藥線結去反為翻花敗症矣治驗州守劉克新患繭唇時出血水內熱口乾吐痰體瘦腎虛之症悉具用濟陰地黃丸年許而愈一儒者因勞役感冒唇生瘡或用四物加黃柏知母之類而愈後復作彼仍用前藥益甚腹中陰冷余用補中益氣湯加茯苓半夏治之而愈儒者楊國華因怒唇口兩耳腫痛寒熱余謂怒生熱熱生風用柴胡山梔散數劑而愈一男子素善怒唇腫脹服清胃等藥時出血水形體骨立余用補中益氣加半夏茯苓桔梗月餘唇腫漸消元氣漸復又以四物加柴胡炒梔丹皮升麻甘草數劑乃去梔加參術而痊一婦人懷抱久郁或時胃口嘈辣胸膈不利月水不調而衰少日晡發熱食少體倦唇腫年餘矣余用歸脾湯如薑汁炒黃連山梔少佐吳茱萸嘈辣頓去飲食少進乃去黃連加貝母遠志胸膈通利飲食如常又用加味逍遙散歸脾湯間服百餘劑月水調而唇方愈一婦人懷抱久郁患繭唇雜用消食降火虛症悉具盜汗如雨此氣血虛而有熱也用當歸六黃湯內黃芩連柏俱炒黑二劑而盜汗頓止乃用歸脾湯八珍散兼服元氣漸復更以逍遙散歸脾湯間服百餘劑而唇亦瘥一婦人唇裂內熱二年矣每作服寒涼之劑時出血水益增他症余用加味清胃散而愈後因怒唇口腫脹寒熱而嘔用小柴胡加山梔茯苓桔梗諸症頓愈復用加味逍遙散而康一婦人善怒下唇微腫內熱體倦用化痰藥食少作嘔大便不實唇出血水用理氣消導胸膈痞滿頭目不清唇腫經閉用清胃行血肢體愈倦發熱煩躁涎水湧出余曰此七情損傷肝脾誤行克伐所致遂用濟生歸脾湯食進便實用加味逍遙散腫消熱退用補中益氣湯脾健涎止後因怒寒熱耳痛胸膈脹悶唇焮腫甚此怒動肝火而傷陰血用四物合小柴胡加山梔頓愈又因怒脅乳作脹肚腹作痛嘔吐酸涎飲食不入小水不利此怒動肝木而克脾土用補中益氣加川芎芍藥而愈又勞役怒氣飲食失節發熱喘渴體倦不食下血如崩唇腫熾甚此肝經有火不能藏血脾經氣虛不能攝血用補中益氣加炒黑山梔芍藥丹皮而愈一男子內熱作渴咳唾痰涎大便乾澀自喜壯實問治於余余曰此脾腎陰虧陽旺之症當壯水之主不信自服二陳芩連之類次年下唇漸腫小便赤澀執守前藥唇出血水大便黑塊小便淋瀝請余往治余曰大便結黑小便淋瀝肝腎敗也唇口腫白脾氣敗也辭不赴竟歿一婦人月經不調兩足熱年餘後而身亦熱勞則足腿痠疼又年餘唇腫裂痛又半年唇裂出血形體疲倦飲食無味月水不通唇下腫如黑棗余曰此肝脾血虛火症彼不信用通經等藥而死一婦人善怒唇腫或用消毒之藥唇脹出血年餘矣余曰須養脾胃滋化源方可愈彼執用前藥狀如翻花瘤而死口瘡二口瘡上焦實熱中焦虛寒下焦陰火各經傳變所致當分別而治之如發熱作渴飲冷實熱也輕則用補中益氣湯重則用六君子湯飲食少思大便不實中氣虛也用人參理中湯手足逆冷肚腹作痛中氣虛寒也用附子理中湯晡熱內熱不時而熱血虛也用八物如丹皮五味麥門發熱作渴唾痰小便頻數腎水虧也用加減八味丸食少便滑面黃肢冷火衰土虛也用八味丸日晡發熱或從腹起陰虛也用四物參朮五味麥門不應用加減八味丸若熱來復去晝見夜伏夜見晝伏不時而動或無定處或從腳起乃無根之火也亦用前丸及十全大補加麥門五味更以附子末唾津調搽湧泉穴若概用寒涼損傷生氣為害匪輕治驗秋官趙君言口舌生瘡勞則體倦發熱惡寒此內傷氣血之症用補中益氣加五味麥門而愈進士劉華甫口舌生瘡午前熱甚脈數而有力用清心蓮子飲稍愈更以四物二連湯全愈後因勞役日晡發熱脈數而無力用四物加參朮柴胡少瘥但體倦口乾再用補中益氣湯而愈武庫劉君口舌生瘡口乾飲湯乃胃氣虛而不能化生津液也用七味白朮散而痊廷評曲汝為口內如無皮狀或咽喉作痛喜熱飲食此中氣真寒而外虛熱也用加減八味丸而愈儒者費懷德發熱口舌狀如無皮用寒涼降火藥面赤發熱作嘔少食痰涎自出此脾胃復傷虛寒而作也用附子理中湯以溫補脾胃用八味丸補命門火乃愈一男子口糜爛脈數無力此血虛而有火用四物加茯苓白朮少用黃柏知母治之而痊地官李孟卿子新婚口舌糜爛日晡益甚用八珍湯加五味麥門而口瘡愈更用加減八味丸而元氣實一男子唇舌生瘡口苦作嘔小便淋澀此肝脾火動以小柴胡加山梔酸棗仁遠志麥門諸症漸愈但晡熱體倦用四物柴胡山梔而愈又加白朮茯苓炙草而安一儒者口苦而辣此肺肝火症先以小柴胡加山梔膽草茯苓桑皮而漸愈更以六君加山梔芍藥而痊瘥若口苦脅脹小便淋瀝此亦肝經之病用六味丸以滋化源一男子口臭牙齦赤爛腿膝痿軟或用黃柏等藥益甚時或口咸此腎經虛熱余用六味丸悉瘥一婦人口苦脅脹用小柴胡山梔黃連少愈更以四君子加芍藥當歸柴胡而瘥一婦人每怒口苦發熱晡甚以小柴胡合四物二劑更以四物加柴胡白朮茯苓丹皮而愈一婦人每怒則口苦兼辣頭痛脅脹乳內刺痛此肝肺之火用小柴胡加山梔青皮芎歸桑皮而安後勞兼怒口復苦經水頓至用四物加炒梔炒膽草一劑更以加味逍遙散而康齒痛三齒者腎之標口者腎之竅諸經多有會於口者齒牙是也徐用誠先生云齒惡寒熱等症本手足陽明經其動搖脫落本足少陰經其蟲疳齦腫出血痛穢皆濕熱胃火或諸經錯雜之邪與外因為患治法濕熱甚而痛者承氣湯下之輕者清胃散調之大腸熱而齦腫痛者清胃散治之重則調胃丸清之六鬱而痛者越鞠丸解之中氣虛而痛者補中益氣湯補之思虛傷脾而痛者歸脾湯調之腎經虛熱而痛者六味丸補之腎經虛寒而痛者還少丹補之重則八味丸主之其屬風熱者獨活散大寒犯腦者血芷散風寒入腦者羌活附子湯病症多端當臨症制宜治驗宗伯毛三江胃經虛熱齒牙作痛用補中益氣加熟地丹皮茯苓芍藥尋愈廷尉張中梁齒動或用清胃散肢體倦怠飲食少思牙齒作痛余曰此脾腎虧損用安腎丸補中益氣湯兼服外用羌活散而愈或牙根潰爛如喜寒惡熱者乃胃血傷也用清胃散若惡寒喜熱者胃氣傷也用補中益氣湯楊考功齒動作渴屬脾胃虛弱陰火熾甚用補中益氣加酒炒黑黃柏四劑又服加減八味丸諸症頓愈又用補中益氣湯而痊愈王侍御齒搖齦露喜冷飲食此胃經濕熱先用承氣湯以退火又用清胃散以調理而齒固繼而用六味丸以補腎水羌活散以祛外邪而尋愈王吏部患齒痛或用祛風等劑更加寒熱體倦懶食欲嘔彼以為火盛余曰病因元氣不足前藥復傷遂用補中益氣加茯苓半夏元氣復而諸症愈郭職方善飲齒痛腮頰焮腫此胃經濕熱用清胃散加乾葛荊防而愈鄭吏部仲冬牙痛連腦此腎經風寒所犯用羌活附子湯一服即愈此症不問冬夏腎虛者多患之急用此藥可瘳緩則不救朱工部午後有熱遇勞遺精甚齒即痛此脾腎虛熱先用補中益氣送六味丸更以十全大補湯而愈黨吏部齒根腫痛焮連腮頰此胃經風熱用犀角升麻湯即愈表兄顏僉憲牙痛右寸後半指脈洪而有力余曰此大腸積熱當用寒涼之劑自泥年高服補陰之藥呻吟徹夜余與同舟赴京煎涼膈散加荊防石膏與服一鍾即愈大尹余時正素善飲齒常浮痛腹痛作瀉此酒積傷脾食後用清胃散食前解醒湯而愈膳部鍾復齊每勞心則齒縫脹而不能咀嚼此元氣虛弱先用補中益氣湯而痊更用十全大補湯雖勞不作儒者柴濟美善飲牙蛀不生或時作痛用桃仁承氣湯二劑又以清胃散加山梔葛根外搽升麻散其牙復出一男子晡熱內熱牙痛齦潰常取小蟲此足三陰虛火足陽明經濕熱先用桃仁承氣湯二劑又用六味地黃丸而愈一男子患齒痛飲食難化大便不實此脾腎不足用還少丹而愈一男子每足發熱牙即浮腫此足三陰虛火用加減八味丸而不復作一男子齒浮作痛耳面黧色口乾作渴日晡則劇此脾虛弱也用補中益氣湯加減八味丸而愈一婦人因怒齒痛寒熱作嘔用清胃等藥益甚此肝火傷胃寒藥復傷用六君子加芍藥柴胡山梔而愈一婦人胃中嘈辣甚則熱痛後患齒痛此胃火生痰也用二陳加芩連下越鞠丸而瘳一婦人發熱齒痛日晡益甚月水不調此脾經血虛所致用逍遙散加升麻尋愈後因怒復痛仍以前藥加川芎而痊一婦人因怒牙痛寒熱用小柴胡加芎歸苓朮山梔而疼痛止用加味逍遙散而寒熱退荊婦每産後齒根皆動必逾日乃止後復懷妊臨月時立齊翁偶至言及此症留十全大補湯二劑令産後煎服齒不復動矣果如言愚奇其神異敢綴數言附之卷末後有作者皆得觀法焉則先生之德垂之永久矣後學吳江史羊生頓首謹書貌云叔父芝岩先生齒根浮腫痛不可忍命貌求治於立翁先生翁曰此痛齦浮而不動屬於坤土乃足陽明脈所貫絡也因胃有濕熱故爾用清胃散加山梔玄參進一服應手而瘥貌謹記其梗概以附醫録將俾後之學醫者有所準則云嘉靖丁未仲秋晚眷生郁貌頓首拜書舌症四經言舌乃心之苗此以竅言也以部分言之五臟皆有所屬以症言之五臟皆有所主如口舌腫痛或狀如無皮或發熱作渴為中氣虛熱若眼若煙觸體倦少食或午後益甚為陰血虛熱若咽痛舌瘡口乾足熱日晡益甚為腎經虛火若四肢厥冷惡寒飲食或痰甚眼赤為命門火衰若發熱作渴飲冷便閉為腸胃實火若發熱惡寒口乾喜湯食少體倦為脾經虛熱若舌本作強腮頰腫痛為脾經濕熱若痰盛作渴口舌腫痛為上焦有熱若思慮過度口舌生瘡咽喉不利為脾經血傷火動若恚怒過度寒熱口苦而舌腫痛為肝經血傷火動病因多端當臨時制宜凡舌腫脹甚宜先刺舌尖或舌上或邊傍出血泄毒以救其急惟舌下濂泉穴此屬腎經雖宜出血亦當禁針慎之治驗工部徐檢齊口舌生瘡喜冷飲食或咽喉作痛大便祕結此實熱也用清涼飲治之而愈仲侍御多思慮舌作痛用苦寒降火藥發熱便血盜汗口乾肢體日瘦此脾氣虧損血虛之熱用加味歸脾湯而愈一男子不慎酒色冬喜飲冷舌常作痛小便頻數舌裂痰盛此腎水枯涸陰火無制名下消用加減八味丸而愈若寸脈洪數有力多飲少食大便如常口舌生瘡大渴引飲者名上消是心移熱於肺用白虎湯加人參治之若關脈洪數有力喜飲冷小便黃大便硬而自汁者名中消調胃承氣湯下之學士吳北川過飲舌本強痛言語不清痰氣湧盛肢體不遂余作脾經濕痰治之而愈秋官鄭過飲舌本強腫言語不清此脾虛濕熱用補中益氣加神麯麥芽乾葛澤瀉而愈一膏粱之人患舌痛敷服皆消毒之藥舌腫勢急余刺舌尖及兩傍出紫血杯許腫消一二更服犀角地黃湯一劑翌早復腫脹仍刺出紫血杯許亦消一二仍服前湯良久舌大腫又刺出黑血二杯許腫漸消忽寒熱作嘔頭痛作暈脈洪浮而數此邪雖去而真氣愈傷與補中益氣倍加參耆歸術四劑而安又數劑而愈一婦人善怒舌痛煩熱用降火化痰等藥前症益甚兩脅作脹服流氣飲肚腹亦脹經行不止此肝虛不能藏血脾虛不能統血用加味歸脾加麥門五味而愈若因暴怒而患前症用小柴胡加丹皮山梔血虛者用八珍加參朮柴胡山梔丹皮虛甚須加炮姜一男子舌下牽強手大指次指不仁或大便祕結或皮膚赤暈此大腸血虛風熱用逍遙散加槐角秦艽而愈一婦人冬患腦疽腫痛熱渴脈洪數實余用清熱消毒散潰之而愈次年三月其舌腫大遍身患紫疔如葡萄不計其數手足尤多各刺出黑血服奪命丹七粒出臭汗瘡熱益甚便祕二日與大黃芩連各三錢升麻白芷山梔薄荷連翹各二錢生草一錢水煎三五沸服大小便出臭血甚多下體稍退乃磨入犀角汁再服舌本及齒縫出臭血諸毒乃消更與犀角地黃湯而愈一婦人善怒舌本強手臂麻余曰舌本屬脾土肝木克之故耳治以六君子加柴胡芍藥而愈先兄口舌糜爛痰涎上壅飲食如常遇大風欲仆地用補中益氣湯及八味丸即愈間藥數日仍作每勞苦則痰盛目赤漱以冷水舌稍愈頃間舌益甚用附子片噙之即愈服前二藥諸症方痊喉痹諸症五喉痹謂喉中呼吸不通語言不出而天氣閉塞也咽痛嗌痛者謂咽喉不能納唾與食而地氣閉塞也喉痹咽嗌痛者謂咽喉俱病天地之氣皆閉塞也當辨內外表裡虛實而治之若鄉村所患相同者屬天行運氣之邪治法當先表散大忌酸藥搽點寒藥下之恐郁其表於內而不得出也其病有二其一屬火經云少陽所到為喉痹又云少陽同天之政三之氣炎暑至民病喉痹用仲景桔梗湯或面赤斑者屬陽毒用陽毒諸方汗之可也其二屬陰濕經云太陰之盛火氣內郁成喉痹又云太陰在泉濕淫所勝病嗌腫喉痹用活人半夏桂枝甘草湯或面青黑者屬陰毒用陰毒法可汗之蕭山先生云喉痹不惡寒及寸脈大滑實於關尺者皆屬下症宜硝石青黛等寒藥降之或膽礬等酸劑收之韓祇和先生云寸脈大於關尺者宜消陽助陰東垣先生云兩寸脈實為陽盛陰虛下之則愈故豫遵此法以治前症如鼓應桴也陳無擇治喉痹不語用小續命加杏仁七個煎服甚效本草治中氣急喉痹欲死白殭蠶為末薑汁調下立愈丹溪云殭蠶屬火而有土有水得金氣而成治喉痹者取其火中清化之氣以從治相火散濁逆結滯之痰陳藏器每治臟寒咽閉吞吐不利用附子去皮臍炮裂以蜜塗炙蜜入內含之勿咽云云孫押班治都知潘元從喉閉孫以藥半錢吹入喉中少頃吐出膿血立愈潘詣孫謝曰大急之患非明公不能救救人之急非藥不能療贈金百兩願求方以濟非常之急孫曰用豬牙皂角白礬黃連各等分置新瓦上焙乾為末既授為方不受所贈謙甫云戊辰春鄉村病喉痹者甚衆蓋前年終之氣及當年初之氣二火之邪也用甘結湯加芩連半夏殭蠶鼠黏子葛根等劑發之虛加參耆當歸之類水漿不入先用解毒雄黃丸醋化灌之痰出更灌薑汁服前藥無不神驗若用膽礬酸寒點過者皆不治蓋邪郁不出故也以上治法內經祕旨救生之良法故録之見醫學綱目治驗廷評張汝翰患喉痛日晡益甚此氣血虛而有熱用八珍湯而愈後每入房發熱頭痛用補中益氣加麥門五味及六味丸常服後不復作秋官葉素陰虛因怒忽喉痛寒熱頭痛項強目直小便自出此皆肝火之症肝主筋膜火主腫脹火旺則血涸筋攣自繫緊急頸項如拔陰挺痿痹則小便自遺遂刺患處出毒血用四物柴胡山梔玄參甘草而蘇再用六味丸料以生肝血滋腎水諸症悉愈太守葉咽喉腫痛痰涎不利手足發熱喜冷飲食用清咽利膈湯二劑不應刺少商穴喉少寬痰從鼻出如膠患處出紫血稍寬至七日咳出穢膿而愈一儒者三場畢忽咽喉腫閉不省人事喘促痰湧汗出如水肢體痿軟脈浮大而數此飲食勞役無根虛火上炎用補中益氣加肉桂一劑頓蘇義士顧克明咽喉作痛至夜發熱此肝腎陰虛之熱用四物加酒炒黑黃柏知母麥門五味治之而愈後因勞咽喉腫閉刺患處出血用桔梗湯吐痰而消至仲夏乾咳聲嘶作渴發熱日晡足熱用滋腎丸加減八味丸間服三月餘喜其年富謹疾得愈喉痛六附乳蛾懸癰楊梅瘡丹溪先生云咽痛屬血虛用四物加竹瀝陰虛火上炎者必用玄參氣虛加人參竹瀝又云咽喉腫痛有陰虛陽氣飛越痰結在上者脈必浮大重取必澀去死為近宜人參一味濃煎細細飲之如作實症治之禍在反掌此發前人未發救無窮之夭枉余更以上焦風熱積熱及膀胱陰虛等症一二於後云云治驗通府李朝用咽喉腫痛口舌生瘡此上焦風熱先用荊防敗毒散二劑喉痛漸愈又以玄參升麻湯口舌遂愈地官黃北盤喉痛作渴飲冷大便不通此上下表裡實熱用防風通聖散治之頓愈地官胡誠甫咽喉燥痛此腎經膀胱虛熱用四物加黃柏知母玄參四劑少愈更以人參固本丸一劑不復發職方盧抑齊咽喉腫痛兩目矇昧小便赤澀此膀胱濕熱用四苓散加黃柏黃連知母茵蔯防己治之而頓愈又用六味地黃丸而痊儒者王文遠咽喉腫痛口舌生瘡勞則愈甚余謂脾肺氣虛膀胱有熱以補中益氣加玄參酒炒黑黃柏知母稍愈乃去黃柏知母加山茱萸山藥乃瘥一儒者年逾五十咽喉痛服涼藥或過勞痛愈甚此中氣虛熱以補中益氣加炒黑芩連四劑而愈乃去芩連又數劑痊愈一儒者腳發熱則咽喉作痛內熱口乾痰涎上湧此腎經虧損火不歸經用補中益氣加麥門五味及加減八味丸而痊愈一老人咽喉痛小便數而赤日晡尤甚此膀胱陰虛當滋化源以補中益氣加酒炒黑黃柏知母二味四劑咽痛稍可乃去二味加以山茱山藥麥門五味頓愈一男子咽喉腫痛藥不能下針患處出紫血少愈以破棺丹噙化更用清咽利膈散而愈一男子素善飲咽喉作痛內熱作渴小便不利飲食如常此膀胱積熱用四苓散加茵蔯大黃四劑諸症漸退又用清心蓮子飲而安一星士勞而入房喉痛漸閉痰涎上湧四肢乍熱此陰虛陽氣飛揚用補中益氣加附子煎灌而愈憲副姜時川癸卯冬就診於豫右寸浮數有力口中有瘡余曰此胃火傳於肺也當薄滋味慎起居甲辰秋復就診尺脈洪數而無力余曰此肺金不能生腎水宜靜養以滋化源彼云今喉間及耳內不時燥痛肢體不時發熱若無根之火殞無疑矣後謂劉古峽云立齊謂我之病可疑至乙巳孟春古峽謂余曰姜公之病已如尊料遂同餘往視喉果腫潰脈愈洪大或用瀉火之藥反速其歿云間吳上舍年逾五十咽喉腫痛或針出血神思雖清尺脈洪數而無倫次按之細微如無余曰有形而無痛陽之類也當峻補其陰今反傷其陰血必死已而果歿蓋此症乃腎氣虧損無根之火炎上為患惟加減八味丸料煎服使火歸源庶幾可救府庠歸云橋之內産後患喉痛服清熱等劑益甚余診之屬膀胱經血虛也蓋膀胱之內脈上行至頸而還用八珍湯加牡丹皮柴胡酒炒黑黃柏二劑而愈嘉靖辛丑仲秋大方憑几執筆就書咽喉間偶有痰涎遂左顧吐之以未及合而頸骨如摧莫能轉視至夜增劇潛發盜汗手足麻冷臥起必藉人扶持稍動則痛連心腹苦楚萬狀不可勝數如是者三四日得立齊先生視之曰此怒動肝火膽得火而筋攣縮以六味地黃丸料加山梔柴胡以清肝火生膽血一劑未竟日而談笑舉動一一如常矣接見賓從俱以為前日之病者罔也先生之神妙類多如此惜乎不肖疏怠蹇拙不能盡述姑以其親視者筆之以為明驗耳吳門晚學生沈大方履文再頓首謹書一婦人喉間作痛兩月後而潰遍身筋骨作痛余以為楊梅瘡毒先以萆薢湯數劑而平更以四物加萆薢黃耆二十劑諸症悉退一彌月小兒口內患之後延遍身年餘不愈以萆薢為末乳汁調服母以白湯調服月餘而愈余見保嬰粹要一男子先患喉痛復發楊梅瘡用輕粉等劑愈而復發仍服前藥後又大發上齶潰爛與鼻相通臂腕數顆其狀如桃大潰年餘不斂虛症悉見余以萆薢湯為主兼以健脾之劑月餘而安余見外科樞要諸骨稻穀發鯁七治諸骨鯁用苧麻根杵爛丸彈子大將所鯁物煎湯化下一方魚骨鯁用細茶五倍子等分為末吹入咽喉立愈一方以犬吊一足取其涎徐徐咽之即消又方白萼花根搗爛取汁徐徐咽之不可著牙治稻芒糠谷鯁喉將鵝吊一足取涎徐徐咽下即消治吞釘鐵金銀銅錢等物但多食肥牛脂諸般肥肉等味隨大便而下一方吞錢燒炭末白湯調下數匙即出或服蜜升許或食茨菰其錢自化治吞發繞喉不出取自亂髮作灰白湯調服一錢治吞鐵或針用餳糖半斤濃煎艾汁調和服之一方磁石磨如棗核大鑽眼以線穿令吞喉間針自引出或吞錢金銀銅鐵磁石須陰陽家用驗者治諸鯁咒法八子和云大凡魚骨麥芒一切竹木刺鯁於喉間及發絆不能下用道藏經中一咒法取東方無根水一碗先以左手結三臺印將水置印上後將右手持一劍訣於水上虛書一龍字密咒九遍咒曰吾從東方來路傍一池水水裡一條龍九頭十八尾問君治何物專用此間水連誦九遍患者飲之即愈誤吞水蛭九治誤吞水蛭食蜜即愈試以活蛭投蜜中即化為水屢驗一書云井中生蛭以白馬骨投之即無試之亦驗水蛭即螞蝗也雖死為末見水復活人吞之為害不小治以前法無不愈者諸蟲入耳十治百蟲入耳用鹽汁灌之或蔥汁尤良或豬肉少許炙香置耳孔邊亦出或用細蘆管入耳內口吸之蟲隨出蜒蚰入耳以鹽少許搽耳內即化為水蜈蚣入耳以雞肉置耳邊自出凡蟲毒入腹作脹飲好酪二升許蟲化為水而毒亦消矣蛇入七竅及蟲咬傷十一凡蛇入七竅劈開蛇尾納川椒數粒以紙封之其蛇自出更煎人參湯飲之或飲酒食蒜以解內毒如被蛇咬食蒜飲酒更用蒜杵爛塗患處加艾於蒜上灸之其毒自解凡毒蟲傷並效男女體氣十二治腋氣五更時用精豬肉二大片以甘遂末一兩拌之挾腋下至天明以生甘草一兩煎湯飲之良久瀉出穢物須在荒野之外則可恐穢氣傳入故也依法三五次即愈虛弱者間日為之其他密陀僧胡粉之類皆塞竅以治其末耳附方並注清胃散治胃火血燥唇裂或為繭唇或牙齦潰爛作痛黃連炒生地黃升麻各一錢牡丹皮八分當歸三錢二分上水煎服加味清胃散即前散加芍藥柴胡治脾胃肝膽經熱柴胡清肝散治肝經怒火風熱傳脾唇腫裂或患繭唇柴胡黃芩炒各一錢黃連炒山梔炒各七分當歸一錢川芎六分生地黃一錢升麻八分牡丹皮一錢甘草三分上水煎服若脾胃弱去芩連加白朮茯苓濟陰地黃丸治陰虛火燥唇裂如繭五味子熟地黃自制杵膏麥門冬當歸肉蓯蓉山茱萸去核枸杞子山藥甘州菊花巴戟肉各等分上為末煉蜜丸桐子大每服七八十丸空心食前白湯送下歸脾湯一名濟生歸脾湯治思慮傷脾血耗唇皺及氣鬱生瘡咽喉不利發熱便血盜汗晡熱等症木香甘草各三分人參白朮茯苓黃耆炒當歸龍眼肉遠志酸棗仁炒各一錢上水煎服加味歸脾湯即前方加柴胡丹皮山梔治思慮動脾火元氣損傷體倦發熱飲食不思失血牙痛等症補中益氣湯治中氣傷損唇口生瘡或齒牙作痛惡寒發熱肢體倦怠食少自汗或頭痛身熱煩躁作渴氣喘脈大而虛或微細軟弱人參黃耆炒甘草各一錢半白朮當歸橘紅各一錢柴胡升麻各五分上薑棗水煎服羌活散治風熱傳脾唇口瞤皺或頭痛目眩或四肢浮腫如風狀羌活茯苓薏苡仁各等分上每服三五錢水煎入竹瀝一匙服人參理中湯治口舌生瘡飲食少思大便不實或畏寒惡熱作嘔腹痞此中氣不足虛火炎上人參白朮乾薑炮甘草炙各等分上每服五七錢或一兩水煎服附子理中湯治症同上但四肢冷逆或嘔吐泄瀉茯苓白芍藥各二錢附子人參各二錢白朮四錢上水煎服香砂六君子湯治口舌生瘡服涼藥過多以致食少作嘔或中氣虛熱所致人參白朮茯苓半夏陳皮各一錢藿香八分甘草炒六分宿砂仁炒八分上姜水煎人參安胃散治胃經虛熱口舌生瘡喜熱飲食人參白茯苓各一錢黃芩二錢甘草炙陳皮各五分黃連三分芍藥七分上水煎服七味白朮散治虛熱口舌生瘡不喜飲冷吐瀉口乾人參白朮木香白茯苓甘草炙藿香各五分乾葛一錢上水煎服四君子湯治口舌生瘡脾胃虛弱飲食少思肚腹不利人參白朮茯苓各一錢甘草炙五分上薑棗水煎服六君子湯治胃氣虛熱口舌生瘡或寒涼克伐食少吐瀉人參白朮茯苓各一錢半陳皮半夏甘草各一錢上薑棗水煎服二陳湯治脾胃虛弱口舌生瘡或中脘停痰嘔吐噁心飲食少思等症陳皮茯苓半夏各一錢半甘草炙五分上薑棗水煎服葛花解醒湯治酒積口舌生瘡或嘔吐泄瀉白豆蔻宿砂仁葛花各五分木香二分青皮二分陳皮茯苓豬苓人參白朮神麯炒澤瀉乾薑各三分上水煎服得微汗酒病去矣龍膽瀉肝湯治口苦或生瘡柴胡一錢黃芩七分甘草人參天門冬去心龍膽草酒拌炒焦黃連炒山梔炒麥門冬知母各五分五味子三分上水煎服小柴胡湯治肝膽經風熱侮脾土唇口腫痛或寒熱往來或日晡發熱或潮熱身熱或怒而發熱脅痛甚者轉側不便兩脅痞滿或瀉利咳嗽或吐酸苦水柴胡一錢黃連一錢半半夏人參各一錢甘草炙五分上薑棗水煎服怒動肝火牙齒痛寒熱加山梔黃連梔子清肝散治三焦及足少陽經風熱口舌生瘡或耳內作癢出水疼痛或胸間作痛或寒熱往來茯苓川芎芍藥牛蒡子炒當歸各七分柴胡山梔牡丹皮各一錢甘草五分上水煎服人參敗毒散加防風荊芥名荊防敗毒散治一切表症瘡瘍焮痛發寒熱或拘頭痛脈細有力者人參羌活獨活柴胡前胡茯苓川芎桔梗枳殼甘草各一錢上水煎服奪命丹治喉閉或疔瘡發大毒或麻木或嘔吐重者昏憒若疔毒牙關緊急用三五丸為末水調灌下有奪命之功蟾酥乾者酒化輕粉各五分枯白礬寒水石煅銅緑乳香沒藥麝香各一錢硃砂三錢蝸牛二十個另研無亦效上為細末用蝸牛或酒糊為丸如緑豆大每服一二丸溫酒或蔥湯下東垣白芷散治大寒犯腦牙齒疼痛麻黃草豆蔻各一錢黃耆升麻各二錢當歸熟地黃各五分吳茱萸白芷各四分藁本三分桂枝二分半羌活八分上另為末和勻搽之東垣牢牙散治牙齦露肉牙疳腫痛或牙齒動搖欲落或牙齒不長牙黃口臭升麻四分羌活地骨皮各一兩膽草一兩半酒浸上為末以溫水漱口每用少許擦之獨活散治風毒牙痛或牙齦腫痛獨活羌活川芎防風各五分細辛生地黃荊芥薄荷各二錢上每服三五錢水煎嗽咽謙甫加減瀉白散治膏粱醇酒勞心過度肺氣有傷以致氣出腥臭涕唾稠黏咽嗌不利口苦幹燥桑白皮二錢地骨皮片黃芩甘草炙各一錢知母七分五味子十粒麥門冬五分桔梗一錢上薑棗水煎服犀角升麻湯治陽明經風熱牙疼或唇頰腫痛犀角鎊升麻防風羌活各一錢白附子五分川芎白芷黃芩各七分甘草三分上水煎熟入犀末服玄參升麻湯治心脾壅熱口舌生瘡或木舌重舌或兩頰腫痛玄參赤芍藥升麻犀角鎊桔梗管仲黃芩炒各一錢甘草五分上水煎服三黃丸治實熱口舌生瘡作渴喜冷或齒齦腫痛等症黃芩黃連黃柏各等分上為末水糊丸桐子大每服七八十丸白湯下安腎丸治腎虛牙痛腰疼補骨脂炒川楝子肉炒葫蘆芭炒茴香炒續斷炒各二兩桃仁杏仁炒山藥茯苓各二兩上為末蜜丸桐子大每服五十丸空心鹽湯下八味丸治腎氣虛寒牙齒作痛面色黧黑精神憔瘦腳膝無力飲食少思或痰氣上升小便頻數齒不堅固或口舌糜爛畏飲冷水即後方每料加肉桂附子各一兩六味丸加五味肉桂各一兩名加減八味丸治腎經虛熱齒不固密或作疼痛或發熱渴淋痰氣壅嗽頭暈眼花咽燥唇裂腰腿痿軟自汗盜汗便血諸血失暗水泛為痰之聖藥血虛發熱之神劑熟地黃八兩作膏山茱萸肉乾山藥各四兩牡丹皮澤瀉各三兩茯苓四兩上為末入地黃煉蜜丸桐子大每服七八十丸空心食前滾湯下地黃鬚自制滋腎丸治腎經陰虛齒痛或蘇蝕色黑日晡發熱腳膝無力小便不利肚腹脹滿詳見內科摘要知母黃柏各酒炒二兩肉桂二錢上為末水丸桐子大每服二百丸空心白滾湯下清心蓮子飲治口舌生瘡煩躁作渴小便赤澀口乾便濁夜間安靜晝則舉發此熱在血分黃芩石蓮茯苓黃耆炒柴胡人參各一錢麥門冬地骨皮車前子炒甘草各二錢半上水煎服還少丹治脾腎虛弱齒牙作痛或不堅固又補虛損生肌體進飲食之聖藥肉蓯蓉遠志去心茴香巴戟去心乾山藥枸杞子熟地黃石菖蒲山茱萸去核杜仲去皮薑製牛膝楮實子炒五味子白茯苓各等分上為末棗肉並蜜丸桐子大每服七十丸溫酒日三服羌活附子湯治冬月大寒犯腦令人腦齒連痛名曰腦風為害甚速非此莫能救麻黃去節黑附子炮各三分羌活蒼朮各五分黃耆一分防風甘草升麻白殭蠶炒去絲黃柏白芷各二分佛耳草有寒嗽者用之如無不用上水煎服十全大補湯治氣血俱虛牙齒腫痛或口舌生瘡或惡寒發熱自汗盜汗食少體倦或寒熱作渴頭痛眩暈或似中風之症白茯苓人參當歸白朮黃耆川芎熟地黃生者自制白芍藥炒甘草炙各一錢肉桂五分上薑棗水煎服八珍湯治氣血俱虛口舌生瘡或齒齦腫潰惡寒發熱或煩躁作渴胸脅作脹或便血吐血盜汗自汗等症人參白朮白茯苓當歸川芎白芍藥熟地黃各一錢甘草炙五分上薑棗水煎服越鞠丸治六郁牙齒痛口瘡或胸滿吐酸飲食少思蒼朮炒神麯炒香附子山查山梔炒撫芎麥芽炒各等分上為末水調神麯糊丸桐子大每服五七十丸滾湯下四物湯加牡丹皮柴胡山梔名加味四物湯治血虛發熱口舌生瘡或牙齦腫潰或日晡發熱煩躁不安或因怒而致當歸熟地黃各三錢芍藥川藥各二錢上水煎服當歸補血湯治口舌生瘡血氣俱虛熱渴引飲目赤面紅其脈洪大而虛重按全無黃耆炙一兩當歸酒製二錢上水煎服元戎四物二連湯治血虛發熱口舌生瘡或晝寒夜熱當歸生地黃白芍藥川芎黃連胡黃連各一錢上水煎服犀角地黃湯治火盛血妄行或吐衄或下血犀角鎊生地黃白芍藥黃芩牡丹皮黃連各一錢上水煎熟入犀末服若因怒而患加柴胡山梔當歸六黃湯治陰虛內熱盜汗當歸熟地黃自制生地黃黃耆炒黃連炒黑黃芩炒黑黃柏炒黑各一錢上水煎服逍遙散治血虛有熱口舌生瘡或口燥咽乾發熱盜汗食少嗜臥甘草炙當歸芍藥炒茯苓白朮炒柴胡各一錢上水煎服加味逍遙散治肝脾有火血虛即前方加山梔丹皮謙甫解毒雄黃丸治纏喉風腫閉或卒倒死牙關緊急雄黃一錢鬱金一分巴豆十四粒去油皮上為末醋糊丸緑豆大用熱茶送下七丸吐頑痰立蘇未吐再服若死而心頭猶熱灌下更生謙甫龍麝聚聖丹治心脾客熱咽喉腫痛或成癰不消或舌本腫脹口舌生瘡川芎一兩生地黃犀角鎊羚羊角鎊琥珀玄參連翹各五分人參赤茯苓馬牙硝片腦麝香各三錢硃砂牛黃各二錢桔梗升麻鉛白霜各五錢南硇砂一兩金箔五十片上為末蜜丸龍眼大金箔為衣薄荷湯化下或噙咽之拔萃桔梗湯治熱腫喉痹桔梗甘草連翹山梔薄荷黃芩各一錢上入竹葉水煎服無擇玉屑無憂散治喉風痰壅或口舌生瘡或骨鯁不下玄參管仲滑石宿砂仁黃連甘草茯苓山豆根荊芥穗各五錢寒水石煨硼砂各三錢上為末每服一錢清水調下此藥又去邪辟瘟止渴甘桔湯治咽喉腫痛甘草六錢苦梗三錢上水煎服白虎湯治胃熱作渴暑熱尤效知母石膏各二錢粳米半合上水煎服調胃承氣湯治中熱大便不通咽喉腫痛或口舌生瘡大黃一兩甘草一錢五分芒硝四錢五分上每服五七錢水煎桃仁承氣湯加當歸一錢名當歸承氣湯治瘀血停滯腹內作痛或發熱發狂大便祕結桃仁五十粒去皮尖研桂枝芒硝甘草炙各一錢大黃二錢上水煎空心服清熱補氣湯治中氣虛熱口舌如無皮狀或發熱作渴人參白朮茯苓當歸酒拌芍藥炒各一錢升麻五味子麥門冬玄參甘草炙各五分上水煎服如不應加炮姜更不應加附子清熱補血湯治口舌生瘡體倦少食日晡益甚或目澀熱痛熟地黃酒拌一錢黃柏知母五味子麥門冬各五分當歸酒拌川芎芍藥各一錢玄參七分柴胡牡丹皮各五分上水煎服如不應用補中益氣湯加五味治之清熱化痰湯治上焦有熱痰盛作渴口舌腫痛貝母天花粉枳實炒桔梗各一錢黃芩黃連各一錢二分玄參升麻各七分甘草五分上水煎服升麻柴胡湯柴胡芍藥山梔子升麻木通各一兩黃芩大青杏仁各五錢石膏上每服四五錢水煎涼膈散治實熱口舌生瘡牙齒作痛或喉舌腫痛便溺祕赤或狂言妄語大便祕結大黃朴硝甘草各一兩連翹四兩山梔黃芩薄荷葉各一兩上為末每服五七錢水煎服如未應當加之防風通聖散治風熱熾盛口舌生瘡大便祕結或發熱煩躁瘡毒作癢等症防風當歸川芎芍藥大黃芒硝連翹薄荷麻黃桔梗石膏黃芩各一兩白朮山梔子荊芥各二錢半甘草二兩滑石三兩上服五七錢水煎或為末白湯調下清咽利膈湯治積熱咽喉腫痛痰涎壅盛煩躁飲冷大便祕結金銀花防風荊芥薄荷桔梗炒黃芩炒黃連炒各一錢五分山梔子炒研連翹各一錢玄參大黃煨朴硝牛蒡子研甘草各七分上水煎服金鑰匙治喉閉喉風痰涎壅塞焰硝一兩五錢白殭蠶一錢硼砂五錢腦子一字雄黃二錢上各為末以竹管吹患處痰涎即出如痰涎雖出咽喉不利急針患處以去惡血潤喉散治氣鬱咽喉閉塞桔梗一兩五錢粉草四錢草紫河車四錢香附三錢百藥煎一錢五分上為末敷口內又方薄荷葉蓬砂各五錢冰片一錢為末吹患處甚效破棺丹名通關散治咽喉腫痛水穀不下青鹽白礬碙砂各等分上為末吹患處有痰吐出小續命湯治陰毒喉痹麻黃五分防風芍藥白朮人參川芎附子生防己黃芩各二分桂枝甘草各五分上水煎服仲景半夏湯治傷寒喉中生瘡不能發聲半夏桂枝甘草各等分上每服七八錢水煎候冷細細咽之萆薢散名換肌消毒散治楊梅瘡不拘初起潰爛或發於舌間喉間並效萆薢名土茯苓又名冷飯糰五錢當歸白芷皂角刺薏苡仁各二錢白蘚皮木瓜不犯鐵器木通金銀花各七分甘草五分上水煎服消熱消毒散治咽喉瘡腫痰涎壅盛或口舌生瘡大便祕結即荊防敗毒散加芩連硝黃人參固本丸治肺氣燥熱小便短赤或肺氣虛熱小便澀滯如淋此治虛而有火之聖藥也生地黃酒拌熟地黃用生者酒拌銅器蒸半日天門冬去心麥門冬去心各一兩人參五錢上除人參為末余藥搗膏加煉蜜少許丸桐子大每服五十丸空心鹽湯或溫酒下中寒人不可服刺少商穴法穴在手大指內側去爪甲針如韭葉刺入二分許以手自臂勒至刺處出血即消若膿成者必須針患處否則不治
